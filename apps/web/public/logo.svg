<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#00ff9d"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00e5ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <!-- Dark background circle -->
  <circle cx="256" cy="256" r="240" fill="#05080d" stroke="url(#glow)" stroke-width="3"/>
  <!-- Inner ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#00e5ff" stroke-width="1" stroke-opacity="0.15"/>
  <!-- Signal arcs (relay concept) -->
  <path d="M 360 170 A 120 120 0 0 1 360 342" fill="none" stroke="#00e5ff" stroke-width="6" stroke-linecap="round" stroke-opacity="0.3" filter="url(#shadow)"/>
  <path d="M 388 198 A 100 100 0 0 1 388 314" fill="none" stroke="#00e5ff" stroke-width="5" stroke-linecap="round" stroke-opacity="0.2"/>
  <path d="M 412 222 A 80 80 0 0 1 412 290" fill="none" stroke="#00e5ff" stroke-width="4" stroke-linecap="round" stroke-opacity="0.12"/>
  <!-- TM letterform -->
  <text x="230" y="310" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="200" fill="url(#glow)" filter="url(#shadow)">TM</text>
  <!-- Bolt accent (relay/signal) -->
  <path d="M 330 180 L 360 180 L 340 232 L 370 232 L 320 300 L 335 244 L 308 244 Z" fill="#00ff9d" fill-opacity="0.9"/>
</svg>
