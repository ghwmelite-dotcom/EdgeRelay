name = "edgerelay-api"
main = "src/index.ts"
compatibility_date = "2024-12-30"

[vars]
CORS_ORIGINS = "https://trademetricspro.com,https://www.trademetricspro.com,https://edgerelay.com,https://app.edgerelay.com,https://edgerelay-web.pages.dev"
JWT_EXPIRY_HOURS = "24"
# VAPID public key — safe to ship publicly (ECDSA P-256 public key).
# Private counterpart stored via `wrangler secret put VAPID_PRIVATE_KEY`.
VAPID_PUBLIC_KEY = "BDg5AlDrVCWAaoqBxi3IRURxHHhlIdU04t3feR3dopBPvwfVhYXq47inDTcjSkVtZBR_t8h8DT9vqAS3XEqjUMA"
VAPID_SUBJECT = "mailto:admin@trademetricspro.com"

[[kv_namespaces]]
binding = "SESSIONS"
id = "ce38cc917a3d42ed99702ea2e369482d"

[[kv_namespaces]]
binding = "BOT_STATE"
id = "cccd807ee9d64f3d84ace82529092566"

[[d1_databases]]
binding = "DB"
database_name = "edgerelay-db"
database_id = "8a0eb54a-7072-40fd-8a34-22c6fb3471e0"
migrations_dir = "../../migrations"

[[r2_buckets]]
binding = "STORAGE"
bucket_name = "edgerelay-storage"

# PAYSTACK_SECRET_KEY must be set via: wrangler secret put PAYSTACK_SECRET_KEY
# Google OAuth:
# wrangler secret put GOOGLE_CLIENT_ID
# wrangler secret put GOOGLE_CLIENT_SECRET
[durable_objects]
bindings = [
  { name = "ACCOUNT_RELAY", class_name = "AccountRelay", script_name = "edgerelay-account-relay" }
]

[ai]
binding = "AI"

# Bias engine crons:
#   */15 * * * *  — snapshot writer + phase-transition alerts (runBiasCron)
#   0    7 * * *  — daily ICC Brief at 07:00 UTC (runDailyBrief)
[triggers]
crons = ["*/15 * * * *", "0 7 * * *"]

[[services]]
binding = "BIAS_SAGE_SERVICE"
service = "edgerelay-bias-sage"
